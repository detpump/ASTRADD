<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aster Trading – Subsystem Control</title>
    <style>
        :root {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color-scheme: dark;
        }

        body {
            margin: 0;
            background: #0d1117;
            color: #eee;
            min-height: 100vh;
        }

        header {
            padding: 18px 32px;
            border-bottom: 1px solid #222;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
        }

        main {
            padding: 24px 32px 48px;
            display: grid;
            grid-template-columns: minmax(280px, 360px) minmax(320px, 1fr);
            gap: 24px;
        }

        section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        h2 {
            margin: 0 0 12px;
            font-size: 1rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            color: #9ddbff;
        }

        .subsystem {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            gap: 12px;
        }

        .subsystem:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .subsystem strong {
            font-size: 0.95rem;
        }

        .actions button {
            margin-left: 8px;
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .actions button:hover {
            background: rgba(157, 219, 255, 0.15);
        }

        .actions button.stop {
            border-color: rgba(255, 120, 120, 0.5);
        }

        .actions button.stop:hover {
            background: rgba(255, 120, 120, 0.15);
        }

        .log {
            font-family: "JetBrains Mono", monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            max-height: 420px;
            overflow-y: auto;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.35);
            padding: 14px;
            border-radius: 8px;
        }

        .status {
            font-size: 0.82rem;
            color: #9ddbff;
            margin-top: 6px;
        }

        .status span {
            color: #fff;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header>ASTER TRADING – OPS PANEL</header>
    <main>
        <section>
            <h2>Subsystems</h2>
            <div id="subsystems"></div>
            <div class="status" id="statusLabel">Status: <span>Loading…</span></div>
        </section>

        <section>
            <h2>Initialization Log</h2>
            <div class="log" id="log">Loading…</div>
        </section>
    </main>

    <script>
        const SUBSYSTEMS = [
            { label: 'Gateway', key: 'gateway' },
            { label: 'Cron Jobs', key: 'cron' },
            { label: 'Trading', key: 'trading' },
            { label: 'Account Listener', key: 'account-listener' }
        ];

        const controlEndpoint = (name) =>
            name === 'account-listener'
                ? '/api/subsystems/account-listener'
                : `/api/subsystems/${name}`;

        const subsystemsDiv = document.getElementById('subsystems');
        const statusLabel = document.getElementById('statusLabel').querySelector('span');
        const logDiv = document.getElementById('log');

        async function refreshSubsystems() {
            statusLabel.textContent = 'Refreshing…';
            try {
                const res = await fetch('/api/trading/status');
                const data = await res.json();
                renderSubsystems(data);
                statusLabel.textContent = 'OK';
            } catch (err) {
                statusLabel.textContent = 'Error fetching status';
            }
        }

        function renderSubsystems(statusData = {}) {
            subsystemsDiv.innerHTML = '';
            SUBSYSTEMS.forEach((sub) => {
                const row = document.createElement('div');
                row.className = 'subsystem';
                const status = statusData[sub.key] || 'unknown';
                row.innerHTML = `
                    <strong>${sub.label}</strong>
                    <span style="font-size:0.82rem;opacity:0.8">${status}</span>
                    <span class="actions">
                        <button data-action="start" data-key="${sub.key}">Start</button>
                        <button data-action="stop" data-key="${sub.key}" class="stop">Stop</button>
                    </span>
                `;
                subsystemsDiv.appendChild(row);
            });
        }

        subsystemsDiv.addEventListener('click', async (ev) => {
            const btn = ev.target.closest('button');
            if (!btn) return;
            const key = btn.getAttribute('data-key');
            const action = btn.getAttribute('data-action');
            btn.disabled = true;
            try {
                await fetch(controlEndpoint(key), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action })
                });
                await refreshSubsystems();
            } catch (err) {
                alert('Failed to run action. Check backend logs.');
            } finally {
                btn.disabled = false;
            }
        });

        async function refreshLog() {
            try {
                const res = await fetch('/api/logs/system-init');
                const data = await res.json();
                if (data.entries && data.entries.length) {
                    const lines = data.entries
                        .slice(-80)
                        .map((entry) =>
                            `${entry.timestamp} ${entry.subsystem} ${entry.action} [${entry.status}] ${entry.message || ''}`
                        )
                        .reverse()
                        .join('\n');
                    logDiv.textContent = lines;
                } else {
                    logDiv.textContent = 'No log entries yet.';
                }
            } catch {
                logDiv.textContent = 'Failed to fetch log.';
            }
        }

        refreshSubsystems();
        refreshLog();
        setInterval(() => {
            refreshSubsystems();
            refreshLog();
        }, 5000);
    </script>
</body>
</html>
