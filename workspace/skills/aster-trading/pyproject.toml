[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*", "*/test_*.py", "*/__pycache__/*"]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false

[tool.coverage.html]
directory = "coverage_html"

[tool.pylance]
# Pylance will use these paths to resolve imports
# This mirrors what conftest.py does at runtime
reportMissingImports = true

[tool.pyright]
# Pyright/Pylance extra paths to resolve imports like "from api.aster_api import"
extraPaths = ["src"]
